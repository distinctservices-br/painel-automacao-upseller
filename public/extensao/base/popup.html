<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Distinct Services</title>
<style>
  body {
    width: 400px;
    height: 200px;
    margin: 0;
    padding: 16px;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a1a;
    color: #f5f5f5;
  }
  h1 {
    font-size: 16px;
    margin: 0 0 12px 0;
    font-weight: 600;
  }
  .status {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px;
    border-radius: 8px;
    background: #262626;
    margin-bottom: 10px;
  }
  .icone {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: #fff;
    flex-shrink: 0;
    font-size: 14px;
  }
  .icone.ok      { background: #16a34a; }
  .icone.erro    { background: #dc2626; }
  .icone.aguard  { background: #6b7280; }
  .status-texto  { font-size: 14px; font-weight: 500; }
  .info {
    font-size: 12px;
    color: #a3a3a3;
    margin: 4px 0;
  }
</style>
</head>
<body>
  <h1 style="color: #73F3A4;">Distinct Services</h1>
  <div class="status">
    <div id="icone" class="icone aguard">⏱</div>
    <div id="status-texto" class="status-texto">Carregando…</div>
  </div>
  <div class="info" id="ultimo-envio">Último envio: —</div>
  <div class="info" id="cliente">Cliente: —</div>
  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
